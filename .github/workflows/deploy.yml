name: landingpage application

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: 🚀 Validar encendido de la app (Modo Background)
      run: |
        python app.py &
        PID=$!
        echo "Esperando 5 segundos para verificar que la app inicie correctamente..."
        sleep 5
        echo "Verificando si el proceso sigue vivo..."
        kill -0 $PID
        echo "✅ La app encendió con éxito. Apagando proceso de prueba..."
        kill $PID

    - name: Construir imagen de docker
      run: docker build -t ghcr.io/andrekn95/landing:1.0.0 .
    
    - name: Login en GitHub Container Registry
      run: echo "${{ secrets.GHCR_PATH }}" | docker login ghcr.io -u andrekn95 --password-stdin
    
    - name: Publicar la imagen creada
      run: docker push ghcr.io/andrekn95/landing:1.0.0

    # 📂 CAMBIO 1: Reemplazar el SSH de prueba por SCP para copiar stack.yml y Makefile
    - name: 📁 Copiar archivos al servidor (SCP)
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.GHC_USER }}
        password: ${{ secrets.GHC_PASSWORD }}
        port: ${{ secrets.GHC_PORTUPS }}
        source: "stack.yml,Makefile"
        target: "/home/${{ secrets.GHC_USER }}/landingC"

    # 🚀 CAMBIO 2: Ejecutar los comandos de Docker Swarm en el VPS
    - name: 🛸 Desplegando servidor
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.GHC_USER }}
        password: ${{ secrets.GHC_PASSWORD }}
        port: ${{ secrets.GHC_PORTUPS }}
        script: |
          echo "Desplegando los servicios..."
          cd /home/${{ secrets.GHC_USER }}/landingC/
          
          # Descargar la versión más reciente que acabamos de compilar
          docker pull ghcr.io/andrekn95/landing:1.0.0
          
          # Desplegar usando Docker Swarm
          docker stack deploy -c stack.yml juanito