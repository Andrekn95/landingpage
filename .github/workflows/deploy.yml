name: landingpage application

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: 🚀 Validar encendido de la app (Modo Background)
      run: |
        python app.py &
        PID=$!
        echo "Esperando 5 segundos para verificar que la app inicie correctamente..."
        sleep 5
        echo "Verificando si el proceso sigue vivo..."
        kill -0 $PID
        echo "✅ La app encendió con éxito. Apagando proceso de prueba..."
        kill $PID

    - name: Construir imagen de docker
      run: docker build -t ghcr.io/andrekn95/landing:1.0.0 .
    
    # 🛠️ CORREGIDO AQUÍ: Ahora Docker sí usará tu clave secreta (GHCR_PATH) para autenticarse con permisos de escritura
    - name: Login en GitHub Container Registry
      run: echo "${{ secrets.GHCR_PATH }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    
    - name: Publicar la imagen creada
      run: docker push ghcr.io/andrekn95/landing:1.0.0

    - name: 🧾 Mostrar variables básicas (solo locales, no secretos)
      run: |
        echo "Probando conexión SSH con:"
        echo "Usuario: ${{ secrets.GHC_USER }}"
        echo "Puerto: ${{ secrets.GHC_PORTUPS }}"
      
    # 🛠️ AJUSTADO AQUÍ: Conexión SSH usando tus credenciales reales de la captura
    - name: 🧪 Probar conexión SSH1
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.VPS_HOST }}       # Tu IP/Host guardado en VPS_HOST
        username: ${{ secrets.GHC_USER }}    # Tu usuario de la captura
        password: ${{ secrets.GHC_PASSWORD }}# Tu contraseña de la captura
        port: ${{ secrets.GHC_PORTUPS }}    # Tu puerto de la captura
        script: |
          echo "✅ Conexión exitosa desde GitHub Actions"
          touch ejemploc.txt
          hostname
          whoami
          uptime